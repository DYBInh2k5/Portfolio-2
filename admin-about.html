    <script>

            darkMode: "class",
            theme: {
                extend: {

        }

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        .glow-hover:hover {
            box-shadow: 0 0 30px rgba(43, 43, 238, 0.8);
            transition: box-shadow 0.3s ease;
        }
    </style>
</head>
