<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Admin Login - Portfolio</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b2bee",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .float-animation {
            animation: float 4s ease-in-out infinite;
        }

        .glow {
            box-shadow: 0 0 30px rgba(43, 43, 238, 0.6);
        }
    </style>
</head>
<body class="font-display bg-background-dark">
    <div id="stars-container" class="fixed inset-0 pointer-events-none z-0"></div>

    <div class="relative flex min-h-screen items-center justify-center p-4">
        <div class="w-full max-w-md">
            <div class="float-animation mb-8 text-center">
                <div class="inline-block p-4 bg-primary/20 rounded-full glow mb-4">
                    <span class="material-symbols-outlined text-primary text-6xl">admin_panel_settings</span>
                </div>
                <h1 class="text-white text-3xl font-black mb-2">Admin Portal</h1>
                <p class="text-white/60">Đăng nhập để quản lý portfolio</p>
            </div>

            <div class="bg-[#191933] rounded-xl p-8 border border-white/10 glow">
                <form id="login-form">
                    <div class="mb-6">
                        <label class="block text-white text-sm font-medium mb-2">Email</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-3 text-white/40">mail</span>
                            <input 
                                type="email" 
                                id="email"
                                required
                                class="w-full bg-[#101022] text-white rounded-lg pl-12 pr-4 py-3 border border-white/10 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50"
                                placeholder="binh.vd01500@sinhvien.hoasen.edu.vn"
                            />
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-white text-sm font-medium mb-2">Mật khẩu</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-3 text-white/40">lock</span>
                            <input 
                                type="password" 
                                id="password"
                                required
                                class="w-full bg-[#101022] text-white rounded-lg pl-12 pr-12 py-3 border border-white/10 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/50"
                                placeholder="••••••••"
                            />
                            <button type="button" id="toggle-password" class="absolute right-3 top-3 text-white/40 hover:text-white">
                                <span class="material-symbols-outlined">visibility</span>
                            </button>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 rounded border-white/20 bg-[#101022] text-primary focus:ring-primary">
                            <span class="text-white/60 text-sm">Ghi nhớ đăng nhập</span>
                        </label>
                    </div>

                    <button 
                        type="submit"
                        class="w-full bg-primary text-white rounded-lg py-3 font-bold hover:bg-primary/90 transition-colors glow flex items-center justify-center gap-2"
                    >
                        <span class="material-symbols-outlined">login</span>
                        <span>Đăng nhập</span>
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <a href="index.html" class="text-white/60 hover:text-primary text-sm transition-colors flex items-center justify-center gap-1">
                        <span class="material-symbols-outlined text-sm">arrow_back</span>
                        <span>Quay lại trang chủ</span>
                    </a>
                </div>
            </div>

            <div id="error-message" class="hidden mt-4 bg-red-500/20 border border-red-500 text-red-400 rounded-lg p-4 text-center">
                <span class="material-symbols-outlined align-middle mr-2">error</span>
                <span id="error-text"></span>
            </div>
        </div>
    </div>

    <script>
        // Generate stars
        function createStars() {
            const container = document.getElementById('stars-container');
            const starCount = 150;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        // Toggle password visibility
        document.getElementById('toggle-password').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('.material-symbols-outlined');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.textContent = 'visibility';
            }
        });

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
            
            setTimeout(() => {
                errorDiv.classList.add('hidden');
            }, 5000);
        }

        // Handle login
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Check if email matches
            if (email !== 'binh.vd01500@sinhvien.hoasen.edu.vn') {
                showError('Email không được phép truy cập!');
                return;
            }

            // In production, this should call your backend API
            // For now, we'll use localStorage for demo
            try {
                // Simulate API call
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('adminToken', data.token);
                    localStorage.setItem('adminEmail', email);
                    window.location.href = 'admin-dashboard.html';
                } else {
                    showError('Email hoặc mật khẩu không đúng!');
                }
            } catch (error) {
                // If backend is not running, use demo mode
                console.log('Backend not available, using demo mode');
                
                // Demo password check (in production, this should be on backend)
                if (password === 'admin123') {
                    localStorage.setItem('adminToken', 'demo-token-' + Date.now());
                    localStorage.setItem('adminEmail', email);
                    window.location.href = 'admin-dashboard.html';
                } else {
                    showError('Mật khẩu không đúng!');
                }
            }
        });

        // Initialize
        createStars();
    </script>
</body>
</html>
