    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24
        }

        /* Spaceship Animation */
        .spaceship {
            position: absolute;
            width: 40px;
            height: 40px;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes orbit1 {
            0% {
                transform: rotate(0deg) translateX(300px) rotate(0deg);
            }
            100% {
                transform: rotate(360deg) translateX(300px) rotate(-360deg);
            }
        }

        @keyframes orbit2 {
            0% {
                transform: rotate(45deg) translateX(250px) rotate(-45deg);
            }
            100% {
                transform: rotate(405deg) translateX(250px) rotate(-405deg);
            }
        }

        @keyframes orbit3 {
            0% {
                transform: rotate(90deg) translateX(350px) rotate(-90deg);
            }
            100% {
                transform: rotate(450deg) translateX(350px) rotate(-450deg);
            }
        }

        @keyframes orbit4 {
            0% {
                transform: rotate(180deg) translateX(280px) rotate(-180deg);
            }
            100% {
                transform: rotate(540deg) translateX(280px) rotate(-540deg);
            }
        }

        @keyframes orbit5 {
            0% {
                transform: rotate(270deg) translateX(320px) rotate(-270deg);
            }
            100% {
                transform: rotate(630deg) translateX(320px) rotate(-630deg);
            }
        }

        .spaceship-1 {
            animation: orbit1 20s linear infinite;
        }

        .spaceship-2 {
            animation: orbit2 25s linear infinite;
        }

        .spaceship-3 {
            animation: orbit3 18s linear infinite;
        }

        .spaceship-4 {
            animation: orbit4 22s linear infinite;
        }

        .spaceship-5 {
            animation: orbit5 28s linear infinite;
        }

        /* Stars Animation */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        /* Glow effect */
        .glow {
            box-shadow: 0 0 20px rgba(43, 43, 238, 0.5);
        }

        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>

    <script>
        // Generate random stars
        function createStars() {
            const container = document.getElementById('stars-container');
            const starCount = 100;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        // Mobile menu toggle
        document.getElementById('mobile-menu-btn')?.addEventListener('click', function() {
            // Add mobile menu functionality here
            alert('Mobile menu - Coming soon!');
        });

        // Initialize
        createStars();
    </script>

    <!-- Mobile Menu Script -->

    <script>
        // Smooth scroll for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>
